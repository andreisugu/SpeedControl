name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint, Format & Security Audits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip2

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Clippy Lint Checks
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo Deny Check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

      - name: Cargo Audit Check
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Native Unit Tests
    needs: check
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Run Tests (No Features)
        run: cargo test --no-default-features --target ${{ matrix.target }}

      - name: Run Tests (All Features)
        run: cargo test --all-features --target ${{ matrix.target }}

  build:
    name: WebAssembly Compilation
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build WASM Component (Release)
        run: cargo build --release --target wasm32-wasip2

  release:
    name: Build & Release Artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build WASM Component (Release)
        run: cargo build --release --target wasm32-wasip2

      - name: Generate permission_cache.json
        run: |
          WASM_PATH="target/wasm32-wasip2/release/SpeedControl.wasm"
          HASH=$(sha256sum "$WASM_PATH" | cut -d ' ' -f 1)
          echo "Generated hash: $HASH"
          cat <<EOF > permission_cache.json
          {
            "entries": {
              "$HASH": {
                "permissions_requested": [
                  "fs.read.data",
                  "fs.write.data"
                ],
                "approved": true
              }
            }
          }
          EOF

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/wasm32-wasip2/release/SpeedControl.wasm
            permission_cache.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
