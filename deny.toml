# cargo-deny configuration file
# See https://embarkstudios.github.io/cargo-deny/ for details.

[graph]
# Ignore build targets that aren't ours if any
targets = []

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "all"
unsound = "all"
yanked = "deny"

[licenses]
# Permitted permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "Unicode-DFS-2016",
    "CC0-1.0",
]

[bans]
# Deny multiple versions of the same crate to keep binary small
multiple-versions = "deny"
# Allow list for duplicates if cargo's resolver pulls minor version variants
skip = []
skip-tree = []

[sources]
# Deny registries and git sources we haven't pre-approved
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = [
    "https://github.com/Pumpkin-MC/Pumpkin",
]
